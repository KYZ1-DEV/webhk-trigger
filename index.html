<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Webhook Trigger</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="flex items-center justify-center h-screen bg-gradient-to-r from-blue-100 via-indigo-100 to-purple-100 font-sans">

    <!-- Container dengan efek glassmorphism -->
    <div class="bg-white/30 backdrop-blur-md shadow-xl rounded-xl p-8 w-full max-w-md border border-white/20">
      <h1 class="text-2xl font-bold text-center text-indigo-700 mb-6">Webhook Trigger</h1>

      <!-- Input pesan -->
      <label for="message" class="block text-sm font-medium text-gray-700 mb-2">Pesan</label>
      <input 
        type="text" 
        id="message" 
        placeholder="Tulis pesan Anda..." 
        class="w-full px-4 py-2 mb-6 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
      />

      <!-- Tombol trigger -->
      <button 
        onclick="triggerWebhook()" 
        class="w-full py-3 px-6 text-lg font-semibold rounded-lg bg-indigo-600 text-white shadow-md hover:bg-indigo-700 transition duration-300"
      >
        🚀 Kirim ke Webhook
      </button>

      <!-- Notifikasi -->
      <div id="notification" class="hidden mt-4 p-4 rounded-lg text-white font-medium text-center"></div>
    </div>

    <script>
      const webhookUrl = "https://1912-140-213-43-50.ngrok-free.app/webhook/andy";

      async function triggerWebhook() {
        const message = document.getElementById("message").value || "No message";
        const url = `${webhookUrl}?_t=${Date.now()}&msg=${encodeURIComponent(message)}`;
        const notif = document.getElementById("notification");

        try {
          const response = await fetch(url, { method: "GET" });
          if (response.ok) {
            notif.textContent = "✅ Pesan berhasil dikirim!";
            notif.className = "mt-4 p-4 rounded-lg text-white font-medium text-center bg-green-500/80 backdrop-blur-md";
          } else {
            notif.textContent = "❌ Gagal mengirim pesan (server error).";
            notif.className = "mt-4 p-4 rounded-lg text-white font-medium text-center bg-red-500/80 backdrop-blur-md";
          }
        } catch (error) {
          notif.textContent = "⚠️ Gagal mengirim pesan (network error).";
          notif.className = "mt-4 p-4 rounded-lg text-white font-medium text-center bg-yellow-500/80 backdrop-blur-md";
        }

        notif.classList.remove("hidden");
      }
    </script>
  </body>
</html>
