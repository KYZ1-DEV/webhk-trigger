<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Kirim Data ke n8n</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="flex items-center justify-center h-screen bg-gradient-to-br from-gray-200 to-white font-sans">
    <div
      class="w-96 p-8 rounded-2xl border border-white/30 shadow-xl bg-white/30 backdrop-blur-xl"
    >
      <h2 class="text-center text-xl font-semibold text-gray-800 mb-6">
        Kirim Data ke n8n
      </h2>
      <form id="webhookForm" class="space-y-4">
        <div>
          <label for="nama" class="block text-sm font-medium text-gray-700 mb-1">Nama:</label>
          <input
            type="text"
            id="nama"
            name="nama"
            required
            class="w-full px-3 py-2 rounded-lg border border-gray-300 bg-white/60 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
          />
        </div>

        <div>
          <label for="usia" class="block text-sm font-medium text-gray-700 mb-1">Usia:</label>
          <input
            type="number"
            id="usia"
            name="usia"
            required
            class="w-full px-3 py-2 rounded-lg border border-gray-300 bg-white/60 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
          />
        </div>

        <button
          type="submit"
          class="w-full py-2.5 rounded-lg bg-gradient-to-r from-blue-500 to-blue-700 text-white font-semibold shadow-md hover:from-blue-600 hover:to-blue-800 transition-transform transform hover:-translate-y-0.5"
        >
          Kirim
        </button>
      </form>
      <div id="message" class="mt-4 text-center text-sm"></div>
    </div>

    <script>
      document
        .getElementById("webhookForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          const nama = document.getElementById("nama").value;
          const usia = document.getElementById("usia").value;
          const messageEl = document.getElementById("message");

          try {
            const response = await fetch(
              "https://1912-140-213-43-50.ngrok-free.app/webhook/andy",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nama, usia }),
              }
            );

            if (response.ok) {
              messageEl.textContent = "✅ Data berhasil dikirim!";
              messageEl.className = "mt-4 text-center text-sm text-green-600 font-medium";
              document.getElementById("webhookForm").reset();
            } else {
              messageEl.textContent = "❌ Gagal mengirim data.";
              messageEl.className = "mt-4 text-center text-sm text-red-600 font-medium";
            }
          } catch (error) {
            console.error(error);
            messageEl.textContent = "⚠️ Terjadi error: " + error.message;
            messageEl.className = "mt-4 text-center text-sm text-red-600 font-medium";
          }
        });
    </script>
  </body>
</html>
